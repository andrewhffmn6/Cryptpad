version: '3.8'

services:
  cryptpad:
    image: cryptpad/cryptpad:latest
    container_name: cryptpad
    restart: unless-stopped
    ports:
      - "8300:3000"
    environment:
      - CPAD_MAIN_DOMAIN=http://localhost:8300
      - CPAD_CONF_UNSAFE_ORIGIN=http://localhost:8300
    volumes:
      - cryptpad_config:/cryptpad/config
      - cryptpad_data:/cryptpad/data

volumes:
  cryptpad_config:
  cryptpad_data:
