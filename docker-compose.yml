version: '3.8'

services:
  cryptpad:
    image: cryptpad/cryptpad:latest
    container_name: cryptpad
    user: "root"
    restart: unless-stopped
    ports:
      - "8300:3000"
    environment:
      - CPAD_MAIN_DOMAIN=http://chadig-02.staging.chattanooga.digital:8300
      - CPAD_CONF_UNSAFE_ORIGIN=http://chadig-02.staging.chattanooga.digital:8300
    volumes:
      - /var/lib/docker/volumes/cryptpad_final_config/_data:/cryptpad/config
      - /var/lib/docker/volumes/cryptpad_final_data/_data:/cryptpad/data
