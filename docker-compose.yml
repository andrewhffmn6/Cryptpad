version: '3.8'

services:
  cryptpad:
    image: cryptpad/cryptpad:latest
    container_name: cryptpad
    restart: unless-stopped
    ports:
      - "8300:3000"
      - "8301:3001"
    volumes:
      - cryptpad_blob:/cryptpad/blob
      - cryptpad_block:/cryptpad/block
      - cryptpad_customize:/cryptpad/customize
      - cryptpad_data:/cryptpad/data
      - cryptpad_datastore:/cryptpad/datastore
    configs:
      - source: cryptpad_config
        target: /cryptpad/config/config.js
    environment:
      - CPAD_MAIN_DOMAIN=http://localhost:8300
      - CPAD_SANDBOX_DOMAIN=http://localhost:8301

volumes:
  cryptpad_blob:
  cryptpad_block:
  cryptpad_customize:
  cryptpad_data:
  cryptpad_datastore:

configs:
  cryptpad_config:
    name: cryptpad_config_v2
    external: true
