version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: your_secure_db_password   # <--- Change this
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - keycloak_net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

  keycloak:
    image: keycloak/keycloak:24.0
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: your_secure_db_password   # <--- Must match Postgres password
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: your_secure_admin_password # <--- Change this
      KC_PROXY: edge
      KC_HOSTNAME_STRICT: "false"
    ports:
      - "8080:8080"
    networks:
      - keycloak_net
    depends_on:
      - postgres
    deploy:
      replicas: 1

volumes:
  postgres_data:

networks:
  keycloak_net:
    driver: overlay
    attachable: true
